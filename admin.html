<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Lista de Invitados</title>
    <style>
        body { font-family: 'Poppins', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; }
        .stat-box { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; margin: 20px 0; }
        .btn-exportar { background-color: #2e7d32; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: background 0.3s; }
        .btn-exportar:hover { background-color: #1b5e20; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Control de Asistencia ⚽</h1>
        <p>Monitoreo y descarga de respuestas en tiempo real.</p>

        <div id="contadorBox" class="stat-box">
            Total de asistentes confirmados: <span id="totalAsistentes">Cargando...</span>
        </div>

        <button id="btnDescargar" class="btn-exportar">📥 Descargar Excel (CSV)</button>
        <p id="mensajeEstado" class="loading"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAmdmYOMGLRJTLfo2PyIZ4t88J0mbCSCAo",
  authDomain: "encuesta-birthday.firebaseapp.com",
  projectId: "encuesta-birthday",
  storageBucket: "encuesta-birthday.firebasestorage.app",
  messagingSenderId: "1043924473238",
  appId: "1:1043924473238:web:8a10a1bad111d4830e39b7",
  measurementId: "G-LBG0YRPNSY"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarDatos() {
            const totalAsistentesSpan = document.getElementById('totalAsistentes');
            const btnDescargar = document.getElementById('btnDescargar');
            const mensajeEstado = document.getElementById('mensajeEstado');

            try {
                const querySnapshot = await getDocs(collection(db, "invitados"));
                
                let listaInvitados = [];
                let contadorSi = 0;

                querySnapshot.forEach((doc) => {
                    const datos = doc.data();
                    listaInvitados.push(datos);
                    
                    if (datos.asistencia === 'si') {
                        contadorSi++;
                    }
                });

                totalAsistentesSpan.textContent = contadorSi;

                btnDescargar.addEventListener('click', () => {
                    if (listaInvitados.length === 0) {
                        alert("Aún no hay respuestas para exportar.");
                        return;
                    }
                    exportarACSV(listaInvitados, contadorSi);
                });

            } catch (error) {
                console.error("Error al leer Firebase: ", error);
                totalAsistentesSpan.textContent = "Error";
            }
        }

        // Función definitiva para separar columnas y reconocer caracteres especiales (tildes/ñ)
        function exportarACSV(datos) {
            // 1. Definimos los encabezados separados por un punto y coma (;)
            let contenido = "Nombre Completo;Estado asistencia\n";

            // 2. Recorremos los datos para agregarlos fila por fila hacia abajo
            datos.forEach((invitado) => {
                let respuestaText = invitado.asistencia === 'si' ? "Sí" : "No";
                
                // Limpiamos cualquier punto y coma accidental que arruine las celdas
                let nombreLimpio = invitado.nombre.replace(/;/g, " ");

                // Estructura limpia hacia abajo
                contenido += `${nombreLimpio};${respuestaText}\n`;
            });

            // 3. TRUCO DE COMPATIBILIDAD AVANZADA PARA EXCEL (Conversión a UTF-16LE)
            // Esto fuerza a Excel a reconocer perfectamente las tildes, la 'ñ' y las columnas separadas
            const buffer = new ArrayBuffer(contenido.length * 2);
            const view = new DataView(buffer);
            for (let i = 0; i < contenido.length; i++) {
                view.setUint16(i * 2, contenido.charCodeAt(i), true); // true = Little Endian
            }

            // 4. Crear el archivo con el marcador de orden de bytes (BOM) adecuado para Excel
            const blob = new Blob([new Uint8Array([0xFF, 0xFE]), buffer], { type: 'text/csv;charset=utf-16le;' });
            const link = document.createElement("a");
            
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "lista_asistencia_cumple.csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
        
        cargarDatos();
    </script>
</body>
</html>
