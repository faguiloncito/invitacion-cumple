<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Estás Invitado!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
</head>
<body>

    <div id="welcomeOverlay" class="welcome-overlay">
    <h1 class="welcome-text">¡HOLA AMIGOOO! 👋⚽</h1>
    </div>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="card">
        
        <div class="event-details">
            <h1>🎂 Mi Cumple ⚽</h1>
            
            <p class="custom-text">
                Te quiero invitar a mi cumpleaños, va a ser una reservación de canchita de fulbo
            </p>
            
            <div class="info-grid">
                <div class="info-item">
                    <span class="icon">📅</span>
                    <span class="info-title">Fecha</span>
                    <span class="info-desc">Sáb, 11 Julio</span>
                </div>
                <div class="info-item">
                    <span class="icon">⏱️</span>
                    <span class="info-title">Hora</span>
                    <span class="info-desc">Pendiente hrs</span>
                </div>
            </div>

            <div class="location-section">
                <p class="location-address">📍 <strong>Lugar:</strong> Nou Camp, 7ma Av, Ciudad de Guatemala</p>
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3860.6482291424327!2d-90.53377232628567!3d14.619104085869482!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8589a1843ceccb93%3A0xb0726f4afe85a7a6!2sNou%20Camp!5e0!3m2!1ses!2sgt!4v1781563574503!5m2!1ses!2sgt" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe >
                </div>
            </div>
        </div>

        <hr class="divider">

        <form id="rsvpForm">
            <p class="subtitle">Por favor, confirma tu asistencia respondiendo a esta breve encuesta.</p>

            <div class="form-group">
                <label for="guestName">Tu Nombre Completo</label>
                <input type="text" id="guestName" placeholder="Tu nombre aqui" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>¿Vas a asistir?</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="attendance" value="si" required> ¡Sí, convocado! 🏃‍♂️⚡
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="attendance" value="no"> En la banca 😔🟥
                    </label>
                </div>
            </div>

            <button type="submit" class="btn-submit">Confirmar Fichaje</button>
        </form>

        <div id="thankYou" class="thank-you-message hidden">
            <h2>⚽ ¡GOOOAL! 🥳</h2>
            <p id="confirmationText"></p>
        </div>
    </div>
</body>
</html>
